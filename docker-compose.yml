services:
  app:
  app:
    image: rallue/reflex-servers:v1.2
    container_name: servers_reflex
    ports:
      - "3000:3000" # Frontend (Estándar)
      - "8000:8000" # Backend (Estándar)
    volumes:
      - reflex_data:/app
    environment:
      - PYTHONUNBUFFERED=1
      - API_URL=${API_URL:-http://localhost:8003}
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
    restart: always

volumes:
  reflex_data:
