version: '3'
services:
  app:
    image: rallue/reflex-servers:v1.2
    container_name: servers_reflex
    ports:
      - "3000:3000" # Frontend (Estándar)
      - "8000:8000" # Backend (Estándar)
    volumes:
      - reflex_data:/app
    environment:
      - API_URL=${API_URL:-http://localhost:8000}
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  reflex_data:
